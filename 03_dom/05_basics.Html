<body style  = "background-color: #212121; color:#fff;">
    <ul class = "Players">
      <li>Virat Kohli</li>

</ul>

<script>

    function addPlayers(PlayersName) {
         const playlist = document.createElement("li")
         playlist.innerHTML = `${PlayersName}`
         document.querySelector('.Players').
         appendChild(playlist)
    }
    addPlayers("Josh HazelWood")

    function secondPlayers(PlayersName) {
        const listPlayers = document.createElement('li')
          listPlayers.appendChild(document.createTextNode(PlayersName))
          document.querySelector('.Players').appendChild(listPlayers)
    }

    secondPlayers("Krunal Pandya")


    function thirdPlayers(PlayersName){
