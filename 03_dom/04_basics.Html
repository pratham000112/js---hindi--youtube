<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I am an Top 1 % Developer</title>
</head>
<body style = "background-color: #212121; color:#fff;">
    <ul class =  "language">
        <li>Javascript is a Good Language</li>
    </ul>
</body>
<script>
     function addLanguage(langName){
       const list =document.createElement('li')
       list.innerHTML = `${langName}`
       document.querySelector('.language').
       appendChild(list)
     }
        addLanguage("Node Js")
        addLanguage("Express Js")


        function addOptiLanguage(langName){
        const list =  document.createElement('li');
             list.appendChild(document.createTextNode(langName))
           document.querySelector('.language').appendChild(list)
        }
          addOptiLanguage('React Js')


          // Edit
          const secondLang =  document.querySelector("li:nth-child(2)")

         const newLI = document.createElement("li") 
         newLI.textContent = "Mongo Db"
          secondLang.replaceWith(newLI)

          /// edit
          const thirdLang = document.querySelector("li:first-child")
                thirdLang.outerHTML = '<li>NodeJs</li>'
        
        // remove 
           const lastlang = document.querySelector('li:last-child')
            lastlang.remove()
</script>
</html>
